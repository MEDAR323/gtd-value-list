<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDV - Garden Tower Defense Values</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #eee;
      margin: 0;
      padding: 0;
    }

    .header {
      background: #111;
      padding: 30px 20px;
      text-align: center;
      border-bottom: 5px solid #4ade80;
    }
    h1 { color: #4ade80; margin: 0; font-size: 2.5em; }
    .subtitle { color: #888; margin: 10px 0 0; }

    .social-links { margin-top: 20px; }
    .social-links a {
      display: inline-block;
      margin: 0 10px;
      padding: 12px 24px;
      background: #1f1f1f;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .social-links a:hover { background: #4ade80; color: black; }

    .controls {
      background: #111;
      padding: 22px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    input, select, button {
      padding: 13px 18px;
      font-size: 16px;
      border-radius: 8px;
      background: #1f1f1f;
      color: white;
      border: none;
    }
    button { 
      background: #4ade80; 
      color: black; 
      font-weight: bold; 
      cursor: pointer; 
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(235px, 1fr));
      gap: 20px;
      max-width: 1500px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .unit-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .unit-card img {
      width: 100%;
      height: 170px;
      object-fit: contain;
      background: #111;
      border-radius: 10px;
    }
    .unit-name { font-size: 1.25em; font-weight: bold; margin: 12px 0 10px; }
    .value { color: #fbbf24; font-size: 1.6em; font-weight: bold; }
    .demand { font-weight: 600; margin: 8px 0; }
    .rarity {
      font-size: 0.95em;
      padding: 6px 18px;
      border-radius: 20px;
      margin-top: 10px;
      display: inline-block;
      font-weight: bold;
    }
    .status {
      font-weight: bold;
      margin-top: 10px;
      padding: 6px 16px;
      border-radius: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>MDV</h1>
    <p class="subtitle">MEDAR323 Values • Garden Tower Defense</p>
    
    <div class="social-links">
      <a href="https://t.me/твой_основной_канал" target="_blank">📢 Мой Канал</a>
      <a href="https://t.me/твой_пиарщик" target="_blank">📣 Пиар / Реклама</a>
    </div>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="🔍 Поиск юнита..." onkeyup="filterUnits()" style="width:280px;">

    <select id="rarityFilter" onchange="filterUnits()">
      <option value="">Все редкости</option>
      <option value="Common">Common</option>
      <option value="Rare">Rare</option>
      <option value="Epic">Epic</option>
      <option value="Legendary">Legendary</option>
      <option value="Gamepass">Gamepass</option>
    </select>

    <select id="statusFilter" onchange="filterUnits()">
      <option value="">Все состояния</option>
      <option value="up">↑ Рост</option>
      <option value="down">↓ Падение</option>
      <option value="stable">→ Стабильно</option>
      <option value="unstable">↯ Нестабильно</option>
    </select>

    <button onclick="resetFilters()">Сбросить всё</button>
  </div>

  <div style="text-align:center; margin:20px 0 30px; color:#777;">
    Найдено: <strong id="count">0</strong> юнитов
  </div>

  <div class="unit-grid" id="unitGrid"></div>

  <script>
    let units = [
      { name: "Gold Chicken Coop", img: "images/gold-chicken-coop.png", value: "495K", demand: "High", rarity: "Legendary", status: "up" },
      { name: "Witchleaf", img: "images/witchleaf.png", value: "415K", demand: "Rising", rarity: "Legendary", status: "up" },
      { name: "Gold Infectia", img: "images/gold-infectia.png", value: "410K", demand: "High", rarity: "Legendary", status: "stable" },
      { name: "VIP Gamepass", img: "images/vip.png", value: "349 Robux", demand: "Medium", rarity: "Gamepass", status: "unstable" }
    ];

    function getDemandStyle(demand) {
      if (demand === "High") return "color: #f87171;";
      if (demand === "Rising") return "color: #4ade80;";
      if (demand === "Medium") return "color: #fbbf24;";
      return "color: #94a3b8;";
    }

    function getRarityStyle(rarity) {
      const map = {
        "Legendary": "background:#7c3aed; color:white;",
        "Epic": "background:#c026d3; color:white;",
        "Rare": "background:#3b82f6; color:white;",
        "Common": "background:#64748b; color:white;",
        "Gamepass": "background:#eab308; color:black;"
      };
      return map[rarity] || "background:#475569; color:white;";
    }

    function getStatusHTML(status) {
      if (status === "up") return `<div class="status" style="background:#14532d; color:#86efac;">↑ Рост</div>`;
      if (status === "down") return `<div class="status" style="background:#7f1d1d; color:#fda4af;">↓ Падение</div>`;
      if (status === "stable") return `<div class="status" style="background:#78350f; color:#fcd34d;">→ Стабильно</div>`;
      if (status === "unstable") return `<div class="status" style="background:#312e81; color:#c4d0ff;">↯ Нестабильно</div>`;
      return '';
    }

    function renderUnits(filtered) {
      const grid = document.getElementById('unitGrid');
      grid.innerHTML = '';

      filtered.forEach(unit => {
        const card = document.createElement('div');
        card.className = 'unit-card';
        card.innerHTML = `
          <img src="${unit.img}" onerror="this.src='images/placeholder.png'">
          <div class="unit-name">${unit.name}</div>
          <div class="value">${unit.value}</div>
          <div class="demand" style="${getDemandStyle(unit.demand)}">Demand: ${unit.demand}</div>
          <div class="rarity" style="\( {getRarityStyle(unit.rarity)}"> \){unit.rarity}</div>
          ${getStatusHTML(unit.status)}
        `;
        grid.appendChild(card);
      });

      document.getElementById('count').textContent = filtered.length;
    }

    function filterUnits() {
      let filtered = [...units];
      const search = document.getElementById('search').value.toLowerCase().trim();
      const rarity = document.getElementById('rarityFilter').value;
      const statusFilter = document.getElementById('statusFilter').value;

      if (search) filtered = filtered.filter(u => u.name.toLowerCase().includes(search));
      if (rarity) filtered = filtered.filter(u => u.rarity === rarity);
      if (statusFilter) filtered = filtered.filter(u => u.status === statusFilter);

      renderUnits(filtered);
    }

    function resetFilters() {
      document.getElementById('search').value = '';
      document.getElementById('rarityFilter').value = '';
      document.getElementById('statusFilter').value = '';
      filterUnits();
    }

    window.onload = () => {
      renderUnits(units);
    };
  </script>
</body>
</html>
