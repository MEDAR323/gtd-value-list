<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDV - Garden Tower Defense Values</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    .header {
      background: #111;
      padding: 25px 20px;
      text-align: center;
      border-bottom: 5px solid #4ade80;
    }
    h1 { color: #4ade80; margin: 0; font-size: 2.4em; }

    .controls {
      background: #111;
      padding: 20px;
      text-align: center;
    }
    button {
      padding: 12px 24px;
      margin: 8px;
      font-size: 16px;
      background: #4ade80;
      color: black;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .unit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .unit-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .unit-card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      background: #111;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>MDV</h1>
    <p>MEDAR323 Values • Garden Tower Defense</p>
  </div>

  <div class="controls">
    <button onclick="generateCollage()">🖼 Создать коллаж (50 юнитов)</button>
    <button onclick="resetFilters()">Сбросить</button>
  </div>

  <div class="unit-grid" id="unitGrid"></div>

  <script>
    let units = [
      { name: "Gold Chicken Coop", img: "images/gold-chicken-coop.png", value: "495K" },
      { name: "Witchleaf", img: "images/witchleaf.png", value: "415K" },
      { name: "Gold Infectia", img: "images/gold-infectia.png", value: "410K" },
      { name: "VIP Gamepass", img: "images/vip.png", value: "349 Robux" }
      // добавляй сюда своих юнитов
    ];

    function renderUnits() {
      const grid = document.getElementById('unitGrid');
      grid.innerHTML = '';

      units.forEach(unit => {
        const div = document.createElement('div');
        div.className = 'unit-card';
        div.innerHTML = `
          <img src="\( {unit.img}" onerror="this.src='https://via.placeholder.com/200?text= \){unit.name}'">
          <div style="margin-top:10px; font-weight:bold;">${unit.name}</div>
          <div style="color:#fbbf24; font-size:18px;">${unit.value}</div>
        `;
        grid.appendChild(div);
      });
    }

    // Генерация коллажа
    async function generateCollage() {
      const container = document.createElement('div');
      container.style.cssText = `
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        width: 1200px;
        background: #111;
        padding: 20px;
        position: absolute;
        left: -9999px;
      `;

      // Берём первые 50 юнитов
      const selected = units.slice(0, 50);

      selected.forEach(unit => {
        const card = document.createElement('div');
        card.style.cssText = 'background:#1a1a1a; padding:10px; text-align:center; border-radius:8px;';
        card.innerHTML = `
          <img src="\( {unit.img}" style="width:100%; height:120px; object-fit:contain;" onerror="this.src='https://via.placeholder.com/150?text= \){unit.name}'">
          <div style="margin:8px 0 4px; font-size:14px;">${unit.name}</div>
          <div style="color:#fbbf24; font-weight:bold;">${unit.value}</div>
        `;
        container.appendChild(card);
      });

      document.body.appendChild(container);

      try {
        const canvas = await html2canvas(container, {
          scale: 1.5,
          backgroundColor: "#111"
        });

        const link = document.createElement('a');
        link.download = `MDV_Коллаж_${selected.length}_юнитов.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        alert(`Коллаж с ${selected.length} юнитами создан и скачан!`);
      } catch(e) {
        alert("Ошибка при создании коллажа");
      }

      container.remove();
    }

    window.onload = () => {
      renderUnits();
    };
  </script>
</body>
</html>
