<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDV - Тест коллажа</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    body { font-family: Arial; background: #0a0a0a; color: white; padding: 20px; }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #4ade80;
      color: black;
      border: none;
      border-radius: 8px;
      margin: 20px 0;
    }
    .unit-card {
      background: #1a1a1a;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Тест генерации коллажа</h1>
  <button onclick="generateCollage()">Создать коллаж из юнитов</button>

  <div id="unitGrid"></div>

  <script>
    let units = [
      { name: "Gold Chicken Coop", img: "images/gold-chicken-coop.png", value: "495K" },
      { name: "Witchleaf", img: "images/witchleaf.png", value: "415K" },
      { name: "Gold Infectia", img: "images/gold-infectia.png", value: "410K" }
    ];

    function renderUnits() {
      const grid = document.getElementById('unitGrid');
      grid.innerHTML = '';
      units.forEach(u => {
        const div = document.createElement('div');
        div.className = 'unit-card';
        div.innerHTML = `<strong>\( {u.name}</strong><br> \){u.value}`;
        grid.appendChild(div);
      });
    }

    async function generateCollage() {
      const container = document.createElement('div');
      container.style.cssText = 'display:grid; grid-template-columns:repeat(5,1fr); gap:10px; width:1200px; background:#111; padding:20px; position:absolute; left:-9999px;';

      units.forEach(unit => {
        const card = document.createElement('div');
        card.style.cssText = 'background:#1a1a1a; padding:10px; text-align:center; border-radius:8px;';
        card.innerHTML = `
          <img src="\( {unit.img}" style="width:100%; height:100px; object-fit:contain;" onerror="this.src='https://via.placeholder.com/150?text= \){unit.name}'">
          <div style="margin-top:8px;">${unit.name}</div>
          <div style="color:#fbbf24;">${unit.value}</div>
        `;
        container.appendChild(card);
      });

      document.body.appendChild(container);

      try {
        const canvas = await html2canvas(container);
        const link = document.createElement('a');
        link.download = 'MDV_Коллаж.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        alert('Коллаж скачан!');
      } catch(e) {
        alert('Ошибка создания коллажа');
      }

      container.remove();
    }

    window.onload = renderUnits;
  </script>
</body>
</html>
